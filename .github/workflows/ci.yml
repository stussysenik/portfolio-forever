name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.32"
      - run: bun install --frozen-lockfile
      - run: bun run sync
      - run: bun run check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.32"
      - run: bun install --frozen-lockfile
      - run: bun run sync
      - run: bun run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.32"
      - run: bun install --frozen-lockfile
      - run: bun run sync
      - run: bunx playwright install --with-deps chromium
      - run: bun run build
        env:
          PUBLIC_CONVEX_URL: ${{ secrets.PUBLIC_CONVEX_URL }}
          PUBLIC_CONVEX_SITE_URL: ${{ secrets.PUBLIC_CONVEX_SITE_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - run: bunx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.32"
      - run: bun install --frozen-lockfile
      - run: bun run sync
      - run: bun run build
        env:
          PUBLIC_CONVEX_URL: ${{ secrets.PUBLIC_CONVEX_URL }}
          PUBLIC_CONVEX_SITE_URL: ${{ secrets.PUBLIC_CONVEX_SITE_URL }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
